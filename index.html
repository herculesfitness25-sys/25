<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赫力健身 — 退費試算</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --line: #1e1e1e;
    --muted: #3a3a3a;
    --dim: #555;
    --mid: #888;
    --text: #e8e4de;
    --gold: #c9a84c;
    --blue: #4a8fd4;
  }

  html, body {
    height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    display: grid;
    grid-template-rows: auto 1fr auto;
    min-height: 100vh;
  }

  /* ── Top bar ── */
  .topbar {
    padding: 24px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--line);
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }

  .brand-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.25rem;
    letter-spacing: 5px;
    color: var(--text);
  }

  .brand-divider {
    width: 1px;
    height: 14px;
    background: var(--muted);
  }

  .brand-sub {
    font-size: 0.65rem;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
  }

  .topbar-right {
    font-size: 0.65rem;
    letter-spacing: 1px;
    color: var(--muted);
    text-align: right;
    line-height: 1.8;
  }

  /* ── Main ── */
  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 40px;
  }

  .eyebrow {
    font-size: 0.6rem;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .eyebrow::before,
  .eyebrow::after {
    content: '';
    display: block;
    width: 32px;
    height: 1px;
    background: var(--muted);
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.8rem, 6vw, 4.5rem);
    letter-spacing: 8px;
    text-align: center;
    line-height: 1;
    color: var(--text);
    margin-bottom: 48px;
  }

  /* ── Cards ── */
  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    width: 100%;
    max-width: 680px;
    margin-bottom: 40px;
  }

  @media (max-width: 560px) {
    .cards { grid-template-columns: 1fr; }
    h1 { font-size: 2.6rem; letter-spacing: 5px; }
    .topbar { padding: 18px 20px; }
    main { padding: 48px 20px; }
  }

  .card {
    background: var(--bg);
    padding: 40px 36px;
    text-decoration: none;
    color: var(--text);
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative;
    transition: background 0.2s;
  }

  .card:hover {
    background: #0f0f0f;
  }

  .card-accent {
    width: 24px;
    height: 2px;
    margin-bottom: 28px;
    transition: width 0.3s ease;
  }

  .card:hover .card-accent { width: 40px; }

  .card.gold .card-accent { background: var(--gold); }
  .card.blue .card-accent { background: var(--blue); }

  .card-label {
    font-size: 0.75rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 10px;
  }

  .card.gold .card-label { color: var(--gold); opacity: 0.7; }
  .card.blue .card-label { color: var(--blue); opacity: 0.7; }

  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 4px;
    line-height: 1;
    margin-bottom: 16px;
  }

  .card-desc {
    font-size: 0.73rem;
    color: var(--mid);
    line-height: 1.8;
    margin-bottom: 32px;
    font-weight: 300;
  }

  .card-meta {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: auto;
    margin-bottom: 28px;
  }

  .meta-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 1px;
  }

  .meta-dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .card.gold .meta-dot { background: var(--gold); opacity: 0.5; }
  .card.blue .meta-dot { background: var(--blue); opacity: 0.5; }

  .card-cta {
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: gap 0.2s;
  }

  .card:hover .card-cta { gap: 12px; }
  .card.gold .card-cta { color: var(--gold); }
  .card.blue .card-cta { color: var(--blue); }

  .cta-arrow {
    font-size: 0.7rem;
  }

  /* ── Footnote ── */
  .footnote {
    font-size: 0.63rem;
    letter-spacing: 1px;
    color: var(--muted);
    text-align: center;
    line-height: 1.8;
  }

  /* ── Footer ── */
  footer {
    border-top: 1px solid var(--line);
    padding: 18px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  .ft-left {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 4px;
    color: var(--muted);
  }

  .ft-right {
    font-size: 0.6rem;
    letter-spacing: 1px;
    color: var(--muted);
    opacity: 0.5;
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="brand-name">HERCULES FITNESS</div>
    <div class="brand-divider"></div>
    <div class="brand-sub">鼎尚體育事業</div>
  </div>
  <div class="topbar-right">
    高雄市苓雅區中正二路139號2樓之2<br>
    07-2254186
  </div>
</header>

<main>
  <div class="eyebrow">內部工具</div>
  <h1>退費試算</h1>

  <div class="cards">
    <a href="hercules-termination-calculator-v2.html" class="card gold">
      <div class="card-accent"></div>
      <div class="card-label">年約會籍</div>
      <div class="card-title">解約試算</div>
      <div class="card-cta">進入試算 <span class="cta-arrow">→</span></div>
    </a>

    <a href="pt-calculator.html" class="card blue">
      <div class="card-accent"></div>
      <div class="card-label">教練課程</div>
      <div class="card-title">退費試算</div>
      <div class="card-cta">進入試算 <span class="cta-arrow">→</span></div>
    </a>
  </div>

  <p class="footnote">
    本工具僅供內部試算參考，不具法律效力<br>
    實際退費以合約條款及主管審核為準
  </p>
</main>

<footer>
  <div class="ft-left">HERCULES FITNESS</div>
  <div class="ft-right">內部使用 · 請勿對外公開</div>
</footer>

</body>
</html>
